name: gh-admin-mod
description: Modular GitHub Action for blocking or auto-moderating issues and pull requests.

inputs:
  github-token:
    description: 'GitHub token for API requests.'
    required: false
    default: ${{ github.token }}
  blocked-users-file:
    description: Path to the file containing blocked usernames, one per line.
    required: false
    default: blockedUser.md
  block-issues:
    description: Whether blocked users should be prevented from opening issues.
    required: false
    default: "true"
  block-prs:
    description: Whether blocked users should be prevented from opening pull requests.
    required: false
    default: "true"
  exempt-associations:
    description: Comma-separated author associations that should never be moderated.
    required: false
    default: OWNER,MEMBER,COLLABORATOR
  comment-message:
    description: >
      Comment posted when the blocklist feature closes an issue or pull request.
      Supports {user}, {type}, {type_plural}, {author_association}, and {reason}.
    required: false
    default: >
      This {type} was automatically closed because @{user} is blocked from opening
      {type_plural} in this repository.
  add-label:
    description: Optional label added for any moderation action.
    required: false
    default: ""
  lock-conversation:
    description: Whether to lock the conversation after closing it.
    required: false
    default: "false"
  close-reason:
    description: State reason used when closing issues.
    required: false
    default: not_planned
  dry-run:
    description: If true, only detect and report moderation matches without changing anything.
    required: false
    default: "false"
  auto-mod:
    description: Enable automatic moderation heuristics for suspicious issues and pull requests.
    required: false
    default: "false"
  auto-mod-keywords:
    description: >
      Comma-separated suspicious keywords or phrases matched against the title and body.
    required: false
    default: telegram,whatsapp,t.me,airdrop,bonus,dm me,contact me,investment opportunity
  auto-mod-max-links:
    description: >
      Maximum allowed link count before auto-mod matches. Set to 0 to disable link counting.
    required: false
    default: "3"
  auto-mod-new-contributors-only:
    description: >
      If true, auto-mod only applies to authors with association NONE, FIRST_TIMER, or
      FIRST_TIME_CONTRIBUTOR.
    required: false
    default: "true"
  auto-mod-comment-message:
    description: >
      Comment posted when auto-mod closes an issue or pull request. Supports {user},
      {type}, {type_plural}, {author_association}, {reason}, {keywords}, and {link_count}.
    required: false
    default: >
      This {type} was automatically closed by auto-mod because it matched suspicious
      content checks: {reason}.
  auto-mod-label:
    description: Optional label added when auto-mod matches.
    required: false
    default: auto-moderated
  concurrency-enabled:
    description: Whether to enable the concurrency limit feature.
    required: false
    default: "false"
  concurrency-limits:
    description: >
      Association-based limits as comma-separated KEY=VALUE pairs.
      Supported keys: OWNER, MEMBER, COLLABORATOR, CONTRIBUTOR, FIRST_TIMER,
      FIRST_TIME_CONTRIBUTOR, NONE. Value 0 means unlimited.
    required: false
    default: NONE=1,FIRST_TIMER=1,FIRST_TIME_CONTRIBUTOR=1,CONTRIBUTOR=10,COLLABORATOR=10,MEMBER=10
  concurrency-comment-message:
    description: >
      Comment posted when the concurrency feature closes an item.
      Supports {user}, {type}, {type_plural}, {author_association}, {reason}, {limit}, and {count}.
    required: false
    default: ""

outputs:
  blocked:
    description: Whether the blocklist feature matched the author.
  blocked-user:
    description: The blocked username that matched, if any.
  item-type:
    description: The moderated item type, either issue or pull_request.
  matched-feature:
    description: The feature that matched, such as blocklist or auto-mod.
  match-reason:
    description: The reason returned by the matched moderation feature.

runs:
  using: 'node20'
  main: 'dist/index.js'
